<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Vietnam 2026</title>
  <meta name="description" content="App web immersive Vietnam 2026" />
  <link rel="icon" type="image/png" href="./icon.png" />
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.15.0/mapbox-gl.css" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="app">
    <div id="map"></div>

    <div class="map-fade"></div>

    <header class="top-widget glass">
      <div class="top-widget__left">
        <div class="app-avatar">
          <img src="./icon.png" alt="Vietnam 2026" onerror="this.style.display='none'" />
        </div>
        <div>
          <p class="tiny-label">Vietnam 2026</p>
          <h1>VNM 26</h1>
          <div class="top-meta">
            <span>🇻🇳 <span id="time-vn">--:--</span></span>
            <span>🇫🇷 <span id="time-fr">--:--</span></span>
          </div>
        </div>
      </div>
      <button id="btn-locate" class="icon-btn" aria-label="Me localiser">⌖</button>
    </header>

    <section class="day-carousel-wrap">
      <div id="day-carousel" class="day-carousel"></div>
    </section>

    <section id="panel" class="panel glass">
      <div class="panel__grab"></div>
      <div class="panel__head">
        <div>
          <p id="panel-kicker" class="panel__kicker">Carte</p>
          <h2 id="panel-title">Vue voyage</h2>
        </div>
        <button id="btn-panel-close" class="icon-btn icon-btn--sm hidden" aria-label="Fermer">×</button>
      </div>
      <div id="panel-content" class="panel__content"></div>
    </section>

    <nav class="dock glass" aria-label="Navigation principale">
      <button class="dock__item" data-tab="planning">
        <span class="dock__icon">🗓️</span>
        <span class="dock__label">Planning</span>
      </button>
      <button class="dock__item dock__item--active" data-tab="map">
        <span class="dock__icon">🌍</span>
        <span class="dock__label">Carte</span>
      </button>
      <button class="dock__item" data-tab="budget">
        <span class="dock__icon">💸</span>
        <span class="dock__label">Budget</span>
      </button>
    </nav>
  </div>

  <script src="https://api.mapbox.com/mapbox-gl-js/v3.15.0/mapbox-gl.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
