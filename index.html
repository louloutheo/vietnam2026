<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>OS Ultimate</title>
    
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="map-container"></div>

    <div id="desktop-ui">
        <os-window title="💸 Budget Vietnam" style="top: 50px; left: 50px; width: 350px;">
            <div class="budget-app">
                <h2 id="total-budget" style="margin: 0; font-size: 2.5rem; text-align: center;">0,00 €</h2>
                <p style="color: #aaa; text-align: center; margin-top: 5px; margin-bottom: 20px;">Total dépensé</p>
                
                <div class="budget-form">
                    <input type="number" id="expense-amount" placeholder="€" step="0.01">
                    <input type="text" id="expense-desc" placeholder="Quoi ? (ex: Phở)">
                    <button id="add-expense-btn">Valider</button>
                </div>

                <ul id="expense-list" class="expense-list"></ul>
            </div>
        </os-window>
    </div>

    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
