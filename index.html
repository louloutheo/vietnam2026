<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vietnam 2026</title>
  <meta name="description" content="Carte immersive Vietnam 2026" />
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.15.0/mapbox-gl.css" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="app">
    <aside class="sidebar">
      <section class="brand glass">
        <p class="eyebrow">Vietnam 2026</p>
        <h1>Théo & Lou-Ann</h1>
        <p class="muted">
          Carte immersive, activités, géolocalisation et ouverture Google Maps.
        </p>
      </section>

      <section class="panel glass">
        <h2>Carte</h2>
        <div class="row">
          <button id="btn-day" class="btn btn--primary">Jour</button>
          <button id="btn-night" class="btn">Nuit</button>
          <button id="btn-vietnam" class="btn">Vue Vietnam</button>
          <button id="btn-globe" class="btn">Globe</button>
        </div>
      </section>

      <section class="panel glass">
        <h2>Position</h2>
        <div class="row">
          <button id="btn-locate" class="btn btn--primary">Me localiser</button>
        </div>
        <p class="muted small">
          Sur mobile, le navigateur te demandera l'autorisation.
        </p>
      </section>

      <section class="panel glass">
        <h2>Activités</h2>
        <div id="activities" class="activities"></div>
      </section>
    </aside>

    <main class="map-shell">
      <div id="map"></div>
      <div class="map-badge glass">
        <span class="dot"></span>
        <span>Vietnam Explorer</span>
      </div>
    </main>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
