<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vietnam 2026 - Masterclass Trip</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3284/3284615.png">

    <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

    <style>
        :root { --primary: #4ade80; --glass-bg: rgba(20, 20, 20, 0.75); --glass-border: rgba(255, 255, 255, 0.15); }
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #000; color: white; overflow: hidden; }
        
        /* LA CARTE EN FOND */
        #cesiumContainer { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* LE CALQUE INVISIBLE (Le secret de Google Maps) */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: env(safe-area-inset-top) 15px env(safe-area-inset-bottom) 15px; box-sizing: border-box; }

        /* TOUS LES ELEMENTS VISIBLES REDEVIENNENT TOUCHABLES */
        .glass-panel, .nav-container { pointer-events: auto; background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 24px; }

        /* WIDGET DU HAUT (Chrono & Info) */
        .top-widget { padding: 15px 20px; align-self: flex-start; max-width: 350px; width: 100%; margin-top: 15px; }
        .top-widget h1 { margin: 0 0 5px 0; font-size: 20px; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; }
        #countdown-container { font-family: monospace; font-size: 16px; font-weight: bold; color: #fff; margin-top: 8px; }
        
        /* CONTENEUR CENTRAL (Pour les vues Itinéraire/Checklist) */
        .middle-container { flex-grow: 1; position: relative; width: 100%; display: flex; justify-content: flex-end; align-items: flex-end; margin-bottom: 20px; }
        
        /* LES VUES (Cartes à droite ou en bas) */
        .app-view { display: none; width: 100%; max-width: 400px; max-height: 60vh; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .app-view h2 { margin: 0 0 15px 0; font-size: 18px; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px; }
        
        .card { background: rgba(255, 255, 255, 0.08); padding: 15px; border-radius: 16px; margin-bottom: 12px; }
        .card h3 { margin: 0 0 5px 0; font-size: 15px; display: flex; justify-content: space-between; }
        .badge { font-size: 10px; padding: 3px 8px; border-radius: 12px; }
        .badge-ok { background: rgba(74, 222, 128, 0.2); color: #4ade80; }

        /* NAVIGATION DU BAS */
        .nav-container { display: flex; justify-content: space-evenly; align-items: center; padding: 12px; margin-bottom: 15px; width: 100%; max-width: 400px; align-self: center; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #888; font-size: 11px; font-weight: 600; cursor: pointer; transition: 0.3s; padding: 5px 15px; border-radius: 16px; }
        .nav-item.active { color: var(--primary); background: rgba(74, 222, 128, 0.1); }
        .nav-icon { font-size: 22px; margin-bottom: 4px; }

        /* SCROLLBAR INVISIBLE */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body>

    <div id="cesiumContainer"></div>

    <div id="ui-layer">
        
        <div class="glass-panel top-widget">
            <h1>Vietnam 2026</h1>
            <div id="countdown-container">Calcul...</div>
        </div>

        <div class="middle-container">
            
            <div id="view-etapes" class="glass-panel app-view">
                <h2>🗺️ Itinéraire</h2>
                <div class="card">
                    <h3>Hanoï <span class="badge badge-ok">Confirmé</span></h3>
                    <p style="margin:0; font-size:13px; color:#ccc;">✈️ Vol & 🏨 Aimee House</p>
                </div>
                <div class="card">
                    <h3>Ninh Binh</h3>
                    <p style="margin:0; font-size:13px; color:#ccc;">🏨 Hang Mua Ecolodge</p>
                </div>
            </div>

            <div id="view-checklist" class="glass-panel app-view">
                <h2>⚡ Urgences</h2>
                <div class="card">
                    <label style="display:flex; align-items:center; font-size:14px;"><input type="checkbox" style="margin-right:10px;"> Payer le trek Oxalis</label>
                </div>
            </div>

        </div>

        <div class="nav-container">
            <div class="nav-item active" data-target="none"><span class="nav-icon">🌍</span>Globe</div>
            <div class="nav-item" data-target="view-etapes"><span class="nav-icon">🧭</span>Itinéraire</div>
            <div class="nav-item" data-target="view-checklist"><span class="nav-icon">⚡</span>Actions</div>
        </div>

    </div>

    <script>
        // COMPTE À REBOURS
        const countDownDate = new Date("Apr 13, 2026 12:10:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const distance = countDownDate - now;
            const d = Math.floor(distance / (1000 * 60 * 60 * 24));
            const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((distance % (1000 * 60)) / 1000);
            document.getElementById("countdown-container").innerHTML = `✈️ - ${d}j ${h}h ${m}m ${s}s`;
        }, 1000);

        // NAVIGATION LOGIQUE (Très propre)
        const navItems = document.querySelectorAll('.nav-item');
        const views = document.querySelectorAll('.app-view');

        navItems.forEach(item => {
            item.addEventListener('click', () => {
                navItems.forEach(nav => nav.classList.remove('active'));
                views.forEach(view => view.style.display = 'none');
                
                item.classList.add('active');
                const target = item.getAttribute('data-target');
                if(target !== 'none') {
                    document.getElementById(target).style.display = 'block';
                }
            });
        });

        // CESIUM GLOBE
        Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJkY2IxMDk2MS1kMmQ3LTRkNjktOTdkMC1jYjlkMzZmNWY1NjkiLCJpZCI6NDAzMzMyLCJpYXQiOjE3NzM0NDQ1MDB9.KR0l-nDsi9iZF82OwlHBktxKmpEdfAXhftNFj4jExb4';
        const viewer = new Cesium.Viewer('cesiumContainer', { terrain: Cesium.Terrain.fromWorldTerrain(), animation: false, timeline: false, baseLayerPicker: false, geocoder: false, homeButton: false, navigationHelpButton: false, sceneModePicker: false });
        viewer.cesiumWidget.creditContainer.style.display = "none";
        viewer.camera.flyTo({ destination: Cesium.Cartesian3.fromDegrees(106.5, 18.5, 2500000), orientation: { pitch: Cesium.Math.toRadians(-65.0) }, duration: 4.0 });
    </script>
</body>
</html>
