    <style>
        :root { --primary: #4ade80; --danger: #ef4444; --glass-bg: rgba(20, 20, 20, 0.75); --glass-border: rgba(255, 255, 255, 0.15); }
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #000; color: white; overflow: hidden; }
        
        button, input, select, textarea, .quick-btn, .nav-item, .refresh-btn { touch-action: manipulation; outline: none; }

        #cesiumContainer { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: env(safe-area-inset-top) 15px env(safe-area-inset-bottom) 15px; box-sizing: border-box; transition: all 0.3s ease; }

        .glass-panel { pointer-events: auto; background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 24px; }

        /* WIDGET HAUT */
        .top-widget { padding: 15px 20px; align-self: flex-start; max-width: 250px; width: 100%; margin-top: 15px; transition: transform 0.3s ease; }
        .top-widget h1 { margin: 0 0 5px 0; font-size: 20px; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; }
        #countdown-container { font-family: monospace; font-size: 14px; font-weight: bold; color: #fff; margin-top: 8px; }
        
        .refresh-btn { position: absolute; top: max(25px, env(safe-area-inset-top)); right: 20px; width: 45px; height: 45px; display: flex; justify-content: center; align-items: center; border-radius: 50%; color: white; font-size: 20px; cursor: pointer; z-index: 50; transition: 0.2s; pointer-events: auto; background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); }
        .refresh-btn:active { transform: scale(0.85); background: var(--primary); color: black; }

        /* MILIEU & VUES */
        .middle-container { flex-grow: 1; position: relative; width: 100%; display: flex; justify-content: flex-end; align-items: flex-end; margin-bottom: 20px; transition: all 0.3s ease; }
        
        .app-view { display: none; width: 100%; max-width: 400px; max-height: 65vh; overflow-y: auto; padding: 20px; box-sizing: border-box; transition: all 0.3s ease; }
        .app-view h2 { margin: 0 0 15px 0; font-size: 18px; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        .card { background: rgba(255, 255, 255, 0.08); padding: 15px; border-radius: 16px; margin-bottom: 12px; }
        .card h3 { margin: 0 0 5px 0; font-size: 15px; display: flex; justify-content: space-between; }
        .badge { font-size: 10px; padding: 3px 8px; border-radius: 12px; }
        .badge-ok { background: rgba(74, 222, 128, 0.2); color: #4ade80; }
