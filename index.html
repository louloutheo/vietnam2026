<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vietnam 2026 - Masterclass</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">

    <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

    <style>
        :root { --primary: #4ade80; --glass-bg: rgba(20, 20, 20, 0.75); --glass-border: rgba(255, 255, 255, 0.15); }
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #000; color: white; overflow: hidden; }
        
        button, input, .quick-btn, .nav-item, .refresh-btn { touch-action: manipulation; }

        #cesiumContainer { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: env(safe-area-inset-top) 15px env(safe-area-inset-bottom) 15px; box-sizing: border-box; transition: all 0.3s ease; }

        .glass-panel { pointer-events: auto; background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 24px; }
        .nav-container { pointer-events: auto; background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 24px; }

        /* WIDGET HAUT GAUCHE */
        .top-widget { padding: 15px 20px; align-self: flex-start; max-width: 250px; width: 100%; margin-top: 15px; transition: transform 0.3s ease; }
        .top-widget h1 { margin: 0 0 5px 0; font-size: 20px; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; }
        #countdown-container { font-family: monospace; font-size: 14px; font-weight: bold; color: #fff; margin-top: 8px; }
        
        /* BOUTON REFRESH (HAUT DROITE) */
        .refresh-btn { position: absolute; top: max(25px, env(safe-area-inset-top)); right: 20px; width: 45px; height: 45px; display: flex; justify-content: center; align-items: center; border-radius: 50%; color: white; font-size: 20px; cursor: pointer; z-index: 50; transition: 0.2s; }
        .refresh-btn:active { transform: scale(0.85); background: var(--primary); color: black; }

        .middle-container { flex-grow: 1; position: relative; width: 100%; display: flex; justify-content: flex-end; align-items: flex-end; margin-bottom: 20px; transition: all 0.3s ease; }
        
        .app-view { display: none; width: 100%; max-width: 400px; max-height: 60vh; overflow-y: auto; padding: 20px; box-sizing: border-box; transition: all 0.3s ease; }
        .app-view h2 { margin: 0 0 15px 0; font-size: 18px; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px; }
        
        .card { background: rgba(255, 255, 255, 0.08); padding: 15px; border-radius: 16px; margin-bottom: 12px; }
        .card h3 { margin: 0 0 5px 0; font-size: 15px; display: flex; justify-content: space-between; }
        .badge { font-size: 10px; padding: 3px 8px; border-radius: 12px; }
        .badge-ok { background: rgba(74, 222, 128, 0.2); color: #4ade80; }

        /* FIX CLAVIER iOS */
        #view-converter.active-converter { position: fixed; top: 0; left: 0; right: 0; width: 100%; max-width: 100%; height: max-content; max-height: 35vh; border-radius: 0 0 24px 24px; padding: 15px; padding-top: calc(15px + env(safe-area-inset-top)); margin: 0; align-self: flex-start; z-index: 100; transform: none; }
        #ui-layer.converter-focused .top-widget { transform: translateY(-200%); }
        #ui-layer.converter-focused .refresh-btn { transform: translateY(-200%); }

        input[type="text"] { background: transparent; border: none; color: white; font-size: 24px; font-weight: bold; text-align: right; width: 70%; outline: none; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        input[type="text"]::placeholder { color: rgba(255,255,255,0.2); }
        
        .quick-btn { background: rgba(74, 222, 128, 0.15); border: 1px solid rgba(74, 222, 128, 0.5); color: var(--primary); padding: 10px; border-radius: 12px; flex: 1; font-weight: 800; cursor: pointer; transition: 0.2s; font-size: 13px; text-transform: uppercase; }
        .quick-btn:active { background: var(--primary); color: black; transform: scale(0.95); }
        .reset-btn { background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.5); color: #ef4444; margin-right: 10px; }

        .nav-container { display: flex; justify-content: space-between; align-items: center; padding: 10px; margin-bottom: 15px; width: 100%; max-width: 400px; align-self: center; transition: transform 0.3s ease; }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: #888; font-size: 10px; font-weight: 600; cursor: pointer; transition: 0.3s; padding: 8px 5px; border-radius: 16px; width: 22%; }
        .nav-item.active { color: var(--primary); background: rgba(74, 222, 128, 0.1); }
        .nav-icon { font-size: 22px; margin-bottom: 4px; }

        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body>

    <div id="cesiumContainer"></div>

    <div id="ui-layer">
        
        <div class="glass-panel refresh-btn" onclick="forceAppRefresh()">↻</div>

        <div class="glass-panel top-widget">
            <h1>Vietnam 2026</h1>
            <div id="countdown-container">Calcul...</div>
        </div>

        <div class="middle-container">
            <div id="view-etapes" class="glass-panel app-view">
                <h2>🗺️ Itinéraire</h2>
                <div class="card">
                    <h3>Hanoï <span class="badge badge-ok">Confirmé</span></h3>
                    <p style="margin:0; font-size:13px; color:#ccc;">✈️ Vol & 🏨 Aimee House</p>
                </div>
            </div>

            <div id="view-checklist" class="glass-panel app-view">
                <h2>⚡ Urgences</h2>
                <div class="card"><label style="display:flex; align-items:center; font-size:14px;"><input type="checkbox" style="margin-right:10px;"> Payer le trek Oxalis</label></div>
            </div>

            <div id="view-converter" class="glass-panel app-view">
                <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:15px; border-bottom:1px solid var(--glass-border); padding-bottom:10px;">
                    <h2>💱 Convertisseur</h2>
                    <div id="rate-info" style="font-size: 10px; color: #aaa; text-transform: uppercase;">1 € = Calcul...</div>
                </div>
                
                <div class="card" style="display: flex; align-items: center; justify-content: space-between; padding: 15px 12px;">
                    <span style="font-size: 28px;">🇻🇳</span>
                    <input type="text" id="input-vnd" placeholder="0" inputmode="decimal">
                    <span style="font-size: 14px; color: #888; margin-left: 10px; font-weight:bold;">VND</span>
                </div>
                
                <div class="card" style="display: flex; align-items: center; justify-content: space-between; padding: 15px 12px;">
                    <span style="font-size: 28px;">🇪🇺</span>
                    <input type="text" id="input-eur" placeholder="0" inputmode="decimal">
                    <span style="font-size: 14px; color: #888; margin-left: 10px; font-weight:bold;">EUR</span>
                </div>

                <div style="display: flex; gap: 8px; margin-top: 15px; flex-wrap: wrap;">
                    <button class="quick-btn reset-btn" onclick="resetConverter()">C</button>
                    <button class="quick-btn" onclick="quickAdd(100000)">100k</button>
                    <button class="quick-btn" onclick="quickAdd(500000)">500k</button>
                    <button class="quick-btn" onclick="quickAdd(1000000)">1M</button>
                </div>
            </div>
        </div>

        <div class="nav-container">
            <div class="nav-item active" data-target="none"><span class="nav-icon">🌍</span>Globe</div>
            <div class="nav-item" data-target="view-etapes"><span class="nav-icon">🧭</span>Étapes</div>
            <div class="nav-item" data-target="view-converter"><span class="nav-icon">💱</span>Monnaie</div>
            <div class="nav-item" data-target="view-checklist"><span class="nav-icon">⚡</span>Actions</div>
        </div>
    </div>

    <script>
        // --- SCRIPT DE MISE À JOUR AUTOMATIQUE (PWA) ---
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(reg => {
                reg.addEventListener('updatefound', () => {
                    const newWorker = reg.installing;
                    newWorker.addEventListener('statechange', () => {
                        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            window.location.reload(true);
                        }
                    });
                });
            });
        }

        // --- LE BOUTON RAFRAÎCHIR MANUEL ---
        window.forceAppRefresh = function() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(function(registrations) {
                    for(let registration of registrations) { registration.update(); }
                });
            }
            window.location.reload(true);
        };

        const countDownDate = new Date("Apr 13, 2026 12:10:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const distance = countDownDate - now;
            const d = Math.floor(distance / (1000 * 60 * 60 * 24));
            const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((distance % (1000 * 60)) / 1000);
            document.getElementById("countdown-container").innerHTML = `✈️ - ${d}j ${h}h ${m}m ${s}s`;
        }, 1000);

        const navItems = document.querySelectorAll('.nav-item');
        const views = document.querySelectorAll('.app-view');
        const middleContainer = document.querySelector('.middle-container');
        const uiLayer = document.getElementById('ui-layer');

        navItems.forEach(item => {
            item.addEventListener('click', () => {
                navItems.forEach(nav => nav.classList.remove('active'));
                views.forEach(view => { view.style.display = 'none'; view.classList.remove('active-converter'); });
                middleContainer.style.alignItems = 'flex-end';
                item.classList.add('active');
                const target = item.getAttribute('data-target');
                if(target !== 'none') { document.getElementById(target).style.display = 'block'; }
            });
        });

        let exchangeRate = parseFloat(localStorage.getItem('vn_rate')) || 27500;
        const rateInfo = document.getElementById('rate-info');
        const inputVnd = document.getElementById('input-vnd');
        const inputEur = document.getElementById('input-eur');

        fetch('https://api.exchangerate-api.com/v4/latest/EUR')
            .then(res => res.json())
            .then(data => {
                exchangeRate = data.rates.VND;
                localStorage.setItem('vn_rate', exchangeRate);
                rateInfo.innerText = `1 € = ${exchangeRate.toLocaleString('fr-FR')} ₫ (En direct 🟢)`;
            })
            .catch(() => {
                rateInfo.innerText = `1 € = ${exchangeRate.toLocaleString('fr-FR')} ₫ (Hors-ligne 🟠)`;
            });

        const parseValue = (val) => parseFloat(val.replace(/\s/g, '').replace(',', '.')) || 0;
        const formatValue = (num, decimals = 0) => num.toLocaleString('fr-FR', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });

        function convertVND() {
            const valVnd = parseValue(inputVnd.value);
            if(valVnd > 0) {
                inputEur.value = formatValue(valVnd / exchangeRate, 2);
                inputVnd.value = formatValue(valVnd, 0);
            } else { inputEur.value = ''; }
        }

        function convertEUR() {
            const valEur = parseValue(inputEur.value);
            if(valEur > 0) {
                inputVnd.value = formatValue(Math.round(valEur * exchangeRate), 0);
                inputEur.value = formatValue(valEur, 2);
            } else { inputVnd.value = ''; }
        }

        window.quickAdd = function(amount) {
            inputVnd.value = formatValue(parseValue(inputVnd.value) + amount, 0);
            convertVND();
        };
        window.resetConverter = function() { inputVnd.value = ''; inputEur.value = ''; convertVND(); }
        inputVnd.addEventListener('input', convertVND);
        inputEur.addEventListener('input', convertEUR);

        [inputVnd, inputEur].forEach(input => {
            input.addEventListener('focus', () => {
                uiLayer.classList.add('converter-focused');
                document.getElementById('view-converter').classList.add('active-converter');
                middleContainer.style.alignItems = 'flex-start';
            });
            input.addEventListener('blur', () => {
                uiLayer.classList.remove('converter-focused');
                document.getElementById('view-converter').classList.remove('active-converter');
                middleContainer.style.alignItems = 'flex-end';
            });
        });

        // --- CESIUM : V6 CLEAN MAP + FRONTIÈRES + PINS ---
        Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJkY2IxMDk2MS1kMmQ3LTRkNjktOTdkMC1jYjlkMzZmNWY1NjkiLCJpZCI6NDAzMzMyLCJpYXQiOjE3NzM0NDQ1MDB9.KR0l-nDsi9iZF82OwlHBktxKmpEdfAXhftNFj4jExb4';
        
        const viewer = new Cesium.Viewer('cesiumContainer', { 
            terrain: Cesium.Terrain.fromWorldTerrain(),
            animation: false, timeline: false, baseLayerPicker: false, geocoder: false, homeButton: false, navigationHelpButton: false, sceneModePicker: false 
        });
        viewer.cesiumWidget.creditContainer.style.display = "none";

        // 1. DESSINER LA FRONTIÈRE DU VIETNAM (Via GeoJSON public)
        const geojsonOptions = {
            stroke: Cesium.Color.fromCssColorString('#4ade80'),
            strokeWidth: 3,
            fill: Cesium.Color.fromCssColorString('#4ade80').withAlpha(0.05) // Léger voile vert sur le pays
        };
        Cesium.GeoJsonDataSource.load('https://raw.githubusercontent.com/johan/world.geo.json/master/countries/VNM.geo.json', geojsonOptions)
            .then(function(dataSource) {
                viewer.dataSources.add(dataSource);
            });

        // 2. PLACER TES PINS (Étapes)
        const route = [
            { name: "Hanoï", lon: 105.8342, lat: 21.0278 },
            { name: "Ninh Binh", lon: 105.9800, lat: 20.2539 }
        ];
        route.forEach(etape => {
            viewer.entities.add({
                position: Cesium.Cartesian3.fromDegrees(etape.lon, etape.lat),
                point: { pixelSize: 12, color: Cesium.Color.fromCssColorString('#4ade80'), outlineColor: Cesium.Color.WHITE, outlineWidth: 2 },
                label: { text: etape.name, font: 'bold 14pt sans-serif', fillColor: Cesium.Color.WHITE, style: Cesium.LabelStyle.FILL_AND_OUTLINE, outlineColor: Cesium.Color.BLACK, outlineWidth: 3, verticalOrigin: Cesium.VerticalOrigin.BOTTOM, pixelOffset: new Cesium.Cartesian2(0, -15) }
            });
        });

        // 3. LE BLOCAGE STRICT DE LA CAMÉRA
        const cc = viewer.scene.screenSpaceCameraController;
        cc.enableTilt = false;       
        cc.enableLook = false;       
        cc.enableTranslate = false;  // Interdit de glisser/panner la caméra dans le vide noir
        
        // LE FIX DU ZOOM : On peut zoomer jusqu'à 250 mètres !
        cc.minimumZoomDistance = 250; 
        cc.maximumZoomDistance = 15000000; 

        // Position initiale de la caméra
        viewer.camera.flyTo({ 
            destination: Cesium.Cartesian3.fromDegrees(106.5, 18.5, 3000000), 
            duration: 0 
        });
    </script>
</body>
</html>
