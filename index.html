<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vietnam 2026 - Trip Tracker</title>
    
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #121212; color: white; overflow: hidden; }
        #cesiumContainer { width: 100%; height: calc(100% - 60px); }
        
        /* Bottom Navigation Bar */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 60px; background-color: #1e1e1e; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #888; text-decoration: none; font-size: 12px; }
        .nav-item.active { color: #4ade80; }
        .nav-icon { font-size: 24px; margin-bottom: 4px; }

        /* Panel UI Overlay */
        #ui-panel { position: absolute; top: 20px; left: 20px; background: rgba(30, 30, 30, 0.85); padding: 15px; border-radius: 12px; backdrop-filter: blur(10px); z-index: 10; border: 1px solid #333; max-width: 300px; }
        h1 { margin: 0 0 10px 0; font-size: 18px; color: #4ade80; }
        p { margin: 0; font-size: 14px; color: #ccc; }
        #db-status { margin-top: 10px; font-size: 12px; padding: 4px 8px; border-radius: 4px; background: #333; display: inline-block; }
    </style>
</head>
<body>

    <div id="cesiumContainer"></div>

    <div id="ui-panel">
        <h1>🇻🇳 Vietnam Trip 2026</h1>
        <p>Prochaine étape : Hanoï</p>
        <div id="db-status">🟠 Connexion Firebase en cours...</div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active"><span class="nav-icon">🌍</span>Globe</div>
        <div class="nav-item"><span class="nav-icon">🗺️</span>Étapes</div>
        <div class="nav-item"><span class="nav-icon">✅</span>Checklist</div>
    </div>

    <script type="module">
        // Import Firebase (version modulaire v9+)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // TA CONFIGURATION FIREBASE EXACTE
        const firebaseConfig = {
            apiKey: "AIzaSyA3FpIWbIjJNK-TaiqFsZJG5XewiLBpJ_Q",
            authDomain: "vietnam-2026.firebaseapp.com",
            projectId: "vietnam-2026",
            storageBucket: "vietnam-2026.firebasestorage.app",
            messagingSenderId: "472100185718",
            appId: "1:472100185718:web:a89bde58f2606d64f56157",
            measurementId: "G-6B2PF76XTS"
        };

        // Initialiser Firebase et Firestore
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Vérification UI que la BDD est connectée
        const statusEl = document.getElementById('db-status');
        try {
            statusEl.innerText = "🟢 Firebase connecté !";
            statusEl.style.color = "#4ade80";
        } catch (e) {
            statusEl.innerText = "🔴 Erreur Firebase";
            console.error(e);
        }

        // --- INITIALISATION DU GLOBE CESIUM 3D ---
        // TON TOKEN CESIUM EXACT
        Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJkY2IxMDk2MS1kMmQ3LTRkNjktOTdkMC1jYjlkMzZmNWY1NjkiLCJpZCI6NDAzMzMyLCJpYXQiOjE3NzM0NDQ1MDB9.KR0l-nDsi9iZF82OwlHBktxKmpEdfAXhftNFj4jExb4';

        const viewer = new Cesium.Viewer('cesiumContainer', {
            terrainProvider: Cesium.createWorldTerrain(),
            animation: false,
            timeline: false,
            baseLayerPicker: false,
            geocoder: false,
            homeButton: false,
            navigationHelpButton: false,
            sceneModePicker: false
        });

        // Enlever le logo Cesium en bas pour faire plus propre
        viewer.cesiumWidget.creditContainer.style.display = "none";

        // Voler directement vers le Vietnam au chargement !
        viewer.camera.flyTo({
            destination: Cesium.Cartesian3.fromDegrees(105.8342, 21.0278, 5000000), // Coordonnées de Hanoï
            duration: 3.0
        });
    </script>
</body>
</html>
